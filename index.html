    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        // ============================
        // ✅ Perf: 动态资源加载器 + 缓存
        // ============================
        const ASSETS = {
          marked: "https://cdn.jsdelivr.net/npm/marked/marked.min.js",
          dompurify: "https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js",
          katexCss: "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css",
          katexJs: "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js",
          katexAutoRender: "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js",
          prismCss: "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css",
          prismCore: "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js",
          prismAutoloader: "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js",
          prismLangPath: "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/"
        };

        const _scriptPromises = window.__scriptPromises || (window.__scriptPromises = {});
        const _cssPromises = window.__cssPromises || (window.__cssPromises = {});

        function loadScriptOnce(src) {
          if (_scriptPromises[src]) return _scriptPromises[src];
          _scriptPromises[src] = new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.defer = true;
            s.onload = () => resolve(true);
            s.onerror = () => reject(new Error("Failed to load script: " + src));
            document.head.appendChild(s);
          });
          return _scriptPromises[src];
        }

        function loadCSSOnce(href) {
          if (_cssPromises[href]) return _cssPromises[href];

          // 已存在则直接 resolve
          const exists = Array.from(document.querySelectorAll('link[rel="stylesheet"]'))
            .some(l => l.href === href);
          if (exists) {
            _cssPromises[href] = Promise.resolve(true);
            return _cssPromises[href];
          }

          _cssPromises[href] = new Promise((resolve, reject) => {
            const l = document.createElement("link");
            l.rel = "stylesheet";
            l.href = href;
            l.onload = () => resolve(true);
            l.onerror = () => reject(new Error("Failed to load css: " + href));
            document.head.appendChild(l);
          });
          return _cssPromises[href];
        }

        function runWhenIdle(fn, timeout = 1200) {
          if ("requestIdleCallback" in window) {
            return window.requestIdleCallback(fn, { timeout });
          }
          return window.setTimeout(fn, 0);
        }

        async function ensureMarked() {
          if (window.marked) return true;
          await loadScriptOnce(ASSETS.marked);
          return true;
        }

        async function ensureDOMPurify() {
          if (window.DOMPurify) return true;
          await loadScriptOnce(ASSETS.dompurify);
          return true;
        }

        async function ensurePrism() {
          if (window.Prism) return true;
          await loadCSSOnce(ASSETS.prismCss);
          await loadScriptOnce(ASSETS.prismCore);
          await loadScriptOnce(ASSETS.prismAutoloader);

          if (window.Prism?.plugins?.autoloader) {
            window.Prism.plugins.autoloader.languages_path = ASSETS.prismLangPath;
          }
          return true;
        }

        async function ensureKatex() {
          if (window.renderMathInElement && window.katex) return true;
          await loadCSSOnce(ASSETS.katexCss);
          if (!window.katex) await loadScriptOnce(ASSETS.katexJs);
          if (!window.renderMathInElement) await loadScriptOnce(ASSETS.katexAutoRender);
          return true;
        }

        function detectNeeds(body) {
          const needsCode = /```/.test(body);
          const needsMath = /\$\$[\s\S]+?\$\$|\$[^$\n]+?\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\)/.test(body);
          return { needsCode, needsMath };
        }

        // ✅ Frontmatter 解析（兼容 \r\n）
        function parseFrontmatter(text) {
          const pattern = /^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/;
          const match = text.match(pattern);
          if (!match) return { meta: null, body: text };

          const yamlBlock = match[1];
          const body = match[2];
          const meta = {};

          yamlBlock.split(/\r?\n/).forEach(line => {
            const parts = line.split(":");
            if (parts.length >= 2) {
              const key = parts[0].trim();
              let value = parts.slice(1).join(":").trim().replace(/^['"](.*)['"]$/, "$1");
              if (value.startsWith("[") && value.endsWith("]")) {
                value = value.slice(1, -1).split(",").map(v => v.trim().replace(/^['"](.*)['"]$/, "$1"));
              }
              meta[key] = value;
            }
          });

          return { meta, body };
        }

        // ✅ 文章缓存（提升点击进入速度）
        const ARTICLE_CACHE = window.__ARTICLE_CACHE__ || (window.__ARTICLE_CACHE__ = new Map());
        const ARTICLE_FETCH_PROMISES = window.__ARTICLE_FETCH_PROMISES__ || (window.__ARTICLE_FETCH_PROMISES__ = new Map());

        async function fetchArticleRecord(filePath) {
          const normalizedPath = normalizeContentPath(filePath);
          if (!normalizedPath) throw new Error("No file path specified.");

          const cached = ARTICLE_CACHE.get(normalizedPath);
          if (cached?.body) return cached;

          if (ARTICLE_FETCH_PROMISES.has(normalizedPath)) return ARTICLE_FETCH_PROMISES.get(normalizedPath);

          const p = (async () => {
            const res = await fetch(normalizedPath, { cache: "no-cache" });
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            const text = await res.text();
            const { meta, body } = parseFrontmatter(text);
            const { needsCode, needsMath } = detectNeeds(body);

            const existing = ARTICLE_CACHE.get(normalizedPath) || {};
            const record = { ...existing, text, meta, body, needsCode, needsMath };
            ARTICLE_CACHE.set(normalizedPath, record);
            return record;
          })().finally(() => {
            ARTICLE_FETCH_PROMISES.delete(normalizedPath);
          });

          ARTICLE_FETCH_PROMISES.set(normalizedPath, p);
          return p;
        }

        // ✅ 预热：首次 hover 就开始加载 Marked+DOMPurify（只触发一次）
        function warmReaderDeps() {
          ensureMarked().catch(() => {});
          ensureDOMPurify().catch(() => {});
        }

        function prefetchArticle(filePath) {
          const normalizedPath = normalizeContentPath(filePath);
          if (!normalizedPath) return;
          warmReaderDeps();
          fetchArticleRecord(normalizedPath).catch(() => {});
        }

        function normalizeContentPath(filePath) {
          if (!filePath || typeof filePath !== 'string') return '';
          if (/^(https?:)?\/\//.test(filePath)) return filePath;
          if (filePath.startsWith('public/')) return filePath;
          if (filePath.startsWith('data/')) return `public/${filePath}`;
          return filePath;
        }

        function hasReadableContent(filePath) {
          return !!normalizeContentPath(filePath);
        }

        function slugifyHeading(value) {
          return String(value || "section")
            .toLowerCase()
            .normalize("NFKD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9\u4e00-\u9fff\s-]/g, "")
            .trim()
            .replace(/\s+/g, "-")
            .replace(/-+/g, "-") || "section";
        }

        function annotateHeadings(html) {
          const container = document.createElement("div");
          container.innerHTML = html;

          const seen = new Map();
          const headings = [];

          container.querySelectorAll("h1, h2, h3").forEach((node) => {
            const title = (node.textContent || "").trim();
            if (!title) return;

            const base = slugifyHeading(title);
            const count = seen.get(base) || 0;
            seen.set(base, count + 1);
            const id = count ? `${base}-${count + 1}` : base;

            node.id = id;
            headings.push({
              id,
              title,
              level: Number(node.tagName.replace("H", ""))
            });
          });

          return {
            html: container.innerHTML,
            headings
          };
        }

        function buildCourseIndex(discipline, course) {
          if (!course?.chapters) {
            return null;
          }

          return {
            type: "library-course",
            disciplineTitle: discipline?.title || "",
            courseTitle: course?.title || "",
            lessons: course.chapters.flatMap((chapter) =>
              (chapter.lessons || []).map((lesson) => ({
                ...lesson,
                chapterTitle: chapter.title,
                readable: hasReadableContent(lesson.filePath),
                filePath: normalizeContentPath(lesson.filePath)
              }))
            )
          };
        }

        function buildLibraryReadingItem(lesson, discipline, course) {
          return {
            ...lesson,
            filePath: normalizeContentPath(lesson.filePath),
            readingContext: buildCourseIndex(discipline, course)
          };
        }

        // --- 默认回退数据 (Backup Data) ---
        const DEFAULT_DB = {
            library: {
                disciplines: [
                    { id: "opt", title: "Optimization", icon: "layers", desc: "凸优化、KKT 条件与一阶方法。", count: "0 Courses" },
                    { id: "prob", title: "Probability", icon: "sigma", desc: "概率空间、随机变量与极限定理。", count: "0 Courses" },
                    { id: "stat", title: "Statistics", icon: "bar-chart-3", desc: "统计推断、估计理论与实验设计。", count: "0 Courses" },
                    { id: "rl", title: "Reinforcement Learning", icon: "gamepad-2", desc: "MDP、策略梯度与价值函数方法。", count: "0 Courses" },
                    { id: "ml", title: "Machine Learning Theory", icon: "infinity", desc: "泛化、复杂度与学习算法的理论基础。", count: "0 Courses" },
                    { id: "info", title: "Information Theory", icon: "radio-tower", desc: "熵、相对熵与高维概率几何。", count: "1 Course" },
                    { id: "diff", title: "Diffusion", icon: "sparkles", desc: "从 VAE/Score Matching 到 SDE 视角。", count: "1 Course" }
                ],
                courses: {

                    "diff": [{ title: "Diffusion Models: Theory to Practice", chapters: [{ title: "Foundations", lessons: [{ id: "diff_01", title: "VAE & ELBO", type: "note", filePath: "public/data/posts/vae_elbo.md" }] }] }]

                        { title: "Score-Based Generative Modeling through SDEs", authors: "Song et al., 2021", tags: ["SDE", "Theory"], filePath: "" }

        // --- Icon（✅ 稳定版：与最初版本一致，用 createIcons + data-lucide） ---
const Icon = memo(({ name, size = 20, strokeWidth = 2, className, ...props }) => {
  const iconRef = useRef(null);

  useEffect(() => {
    const root = iconRef.current;
    if (!root) return;

    const renderOnce = () => {
      const lucide = window.lucide;
      if (!lucide || typeof lucide.createIcons !== "function") return false;

      // 用 data-lucide 的方式（最兼容，包括 tv-2 / arrow-right 这种 kebab-case）
      root.innerHTML = `<i data-lucide="${name}"></i>`;

      lucide.createIcons({
        root,
        attrs: {
          width: size,
          height: size,
          class: className || "",
          "stroke-width": strokeWidth
        }
      });

      return true;
    };

    // 先尝试一次
    if (renderOnce()) return;

    // 极端情况下（脚本还没就绪）做短暂重试，避免“首次渲染空白”
    let tries = 0;
    const timer = setInterval(() => {
      tries += 1;
      if (renderOnce() || tries >= 20) clearInterval(timer);
    }, 50);

    return () => clearInterval(timer);
  }, [name, size, strokeWidth, className]);

  return (
    <span
      ref={iconRef}
      style={{ display: "inline-flex", verticalAlign: "middle" }}
      {...props}
    />
  );
});

        // --- 统一的 "Action Button" ---
        const ActionButton = ({ text, onClick, href }) => {

        );

        const SectionBackButton = ({ label, onClick }) => (

              type="button"

        // --- Logo 组件 ---
        const Logo = () => (
          <div className="flex items-center gap-3 select-none group cursor-pointer">
            <div className="relative w-11 h-11 flex items-center justify-center bg-white border border-stone-200 shadow-sm rounded-xl group-hover:shadow-md transition-all duration-300 overflow-hidden">
                <svg width="44" height="44" viewBox="0 0 44 44" className="opacity-95">
                    <rect x="5.5" y="5.5" width="33" height="33" rx="10" fill="#FCFCFB" stroke="#D6D3D1" />
                    <path d="M22 11.2V33.2" stroke="#D6D3D1" strokeWidth="1.2" strokeLinecap="round" />
                    <path d="M12.2 30.8C15 29.8 17.4 27.9 19.2 25.25C21 22.6 22.35 20.45 24.1 18.75C25.85 17.05 28.05 15.4 32.4 12.55" stroke="#1E3A8A" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round" className="group-hover:stroke-blue-700 transition-colors duration-500" />
                    <circle cx="12.25" cy="30.85" r="3" fill="#1C1917" className="group-hover:fill-stone-900 transition-colors duration-500" />
                    <circle cx="32.45" cy="12.7" r="3" fill="#FCFCFB" stroke="#B67A2D" strokeWidth="1.8" className="group-hover:stroke-amber-600 transition-colors duration-500" />
                    <circle cx="21.8" cy="21.8" r="1.25" fill="#2F5E58" className="group-hover:fill-teal-700 transition-colors duration-500" />
                </svg>
            </div>
            <div className="flex flex-col justify-center">
                <div className="font-serif text-lg font-bold tracking-tight leading-none" style={{
                    background: 'linear-gradient(to right, #1e3a8a, #2563eb)',
                    WebkitBackgroundClip: 'text',
                    WebkitTextFillColor: 'transparent'
                }}>
                    MIStatlE
                </div>
            </div>
          </div>
        );

        const PlatformIcon = ({ platform }) => {
            if (platform === 'bilibili') {
                return (
                    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="4" y="6.5" width="16" height="11" rx="2.5" fill="none" stroke="currentColor" strokeWidth="1.8"/>
                        <path d="M9 4.2 7.4 6M15 4.2 16.6 6M9.2 10.5v3M14.8 10.5v3M9 15.7c1 .65 2 .95 3 .95s2-.3 3-.95" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                );
            }

            if (platform === 'xiaohongshu') {
                return (
                    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3.6" y="4.2" width="16.8" height="15.6" rx="4.8" fill="currentColor" opacity="0.1"/>
                        <rect x="3.6" y="4.2" width="16.8" height="15.6" rx="4.8" fill="none" stroke="currentColor" strokeWidth="1.35"/>
                        <text x="12" y="13.35" textAnchor="middle" fontSize="6.25" fontWeight="700" fill="currentColor" fontFamily="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont">RED</text>
                    </svg>
                );
            }

            if (platform === 'zhihu') {
                return (
                    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                        <text x="12" y="12.6" textAnchor="middle" fontSize="7.2" fontWeight="700" fill="currentColor" fontFamily="'Noto Sans CJK SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">知乎</text>
                        <path d="M5.15 16.95h13.7" stroke="currentColor" strokeWidth="1.45" strokeLinecap="round"/>
                    </svg>
                );
            }

            if (platform === 'wechat') {
                return (
                    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10.3 6.2c-3.4 0-6.1 2.28-6.1 5.1 0 1.6.88 3 2.26 3.96l-.62 2.14 2.37-1.2c.66.16 1.36.24 2.1.24 3.36 0 6.08-2.28 6.08-5.14 0-2.82-2.72-5.1-6.08-5.1Z" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
                        <path d="M15.85 11.2c-2.36 0-4.27 1.58-4.27 3.55 0 1.08.57 2.02 1.48 2.67l-.34 1.51 1.7-.84c.45.1.93.15 1.43.15 2.35 0 4.27-1.6 4.27-3.56s-1.92-3.48-4.27-3.48Z" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
                        <circle cx="8.3" cy="11.1" r="0.85" fill="currentColor"/>
                        <circle cx="12.15" cy="11.1" r="0.85" fill="currentColor"/>
                        <circle cx="14.65" cy="14.65" r="0.75" fill="currentColor"/>
                        <circle cx="17.45" cy="14.65" r="0.75" fill="currentColor"/>
                    </svg>
                );
            }

            return <Icon name="link" size={18} />;
        };

        // --- 社交链接组件 ---
        const SocialLink = ({ platform, icon, label, href, colorClass, note }) => {
            const sharedClass = `group relative flex flex-col items-center gap-2 transition-transform hover:-translate-y-1`;
            const badge = (
                <>
                    <div className={`w-10 h-10 rounded-full bg-white border border-stone-200 flex items-center justify-center shadow-sm group-hover:shadow-md transition-all ${colorClass}`}>
                        {icon ? <Icon name={icon} size={18} /> : <PlatformIcon platform={platform} />}
                    </div>
                    <span className="text-[10px] font-mono text-stone-400 uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity absolute -bottom-6 whitespace-nowrap">
                      {note || label}
                    </span>
                </>
            );

            if (!href) {
                return (
                    <div aria-label={label} className={`${sharedClass} cursor-default opacity-70`}>
                        {badge}
                    </div>
                );
            }

            return (
                <a
                  href={href}
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label={label}
                  className={sharedClass}
                >
                    {badge}
                </a>
            );
        };

        // --- 导航栏 (Navbar) ---
        const Navbar = ({ activeTab, setActiveTab }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const handleTabClick = (tab) => {
                setActiveTab(tab);
                setIsMenuOpen(false);
            };

            return (
                <nav className="sticky top-0 z-50 glass-nav transition-all duration-300">
                    <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                        <div onClick={() => handleTabClick('home')}><Logo /></div>
                        
                        <div className="hidden lg:flex items-center gap-1 bg-stone-100/50 p-1 rounded-full border border-stone-200/50">
                            {['library', 'papers', 'lab', 'posts', 'tools'].map((item) => (
                                <button
                                  key={item}
                                  onClick={() => setActiveTab(item)} 
                                  aria-current={activeTab === item ? "page" : undefined}
                                  className={`px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 ${activeTab === item ? 'bg-stone-900 text-white shadow-md' : 'text-stone-500 hover:text-stone-900 hover:bg-stone-200/50'}`}
                                >
                                    {item.charAt(0).toUpperCase() + item.slice(1)}
                                </button>
                            ))}
                        </div>
                        
                        <div className="hidden lg:flex items-center gap-4">
                             <button onClick={() => setActiveTab('about')} className="font-serif text-sm font-bold text-stone-900 hover:text-blue-900 transition-colors">
                                 ABOUT
                             </button>
                        </div>

                        <button
                          type="button"
                          className="lg:hidden p-2 rounded-md hover:bg-stone-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-900/30"
                          onClick={() => setIsMenuOpen(!isMenuOpen)}
                          aria-label={isMenuOpen ? "Close menu" : "Open menu"}
                          aria-expanded={isMenuOpen}
                          aria-controls="mobile-menu"
                        >
                          <Icon name={isMenuOpen ? "x" : "menu"} className="text-stone-800" />
                        </button>
                    </div>

                    {isMenuOpen && (
                        <div id="mobile-menu" className="lg:hidden absolute top-20 left-0 w-full bg-[#fafaf9] border-b border-stone-200 shadow-xl p-4 flex flex-col gap-2 slide-down">
                            {['library', 'papers', 'lab', 'posts', 'tools', 'about'].map((item) => (
                                <button
                                  key={item}
                                  onClick={() => handleTabClick(item)} 
                                  aria-current={activeTab === item ? "page" : undefined}
                                  className={`px-4 py-3 text-left rounded-lg text-sm font-medium transition-colors ${activeTab === item ? 'bg-stone-200 text-stone-900' : 'text-stone-500 hover:bg-stone-100'}`}
                                >
                                    {item.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    )}
                </nav>
            );
        };

        // --- ArticleReader（✅ 重库按需加载 + 缓存 + 空闲时高亮/公式） ---
        const ArticleReader = ({ item, onBack, onSelectItem }) => {
            const [state, setState] = useState({ 
                content: '', 
                frontmatter: null, 
                loading: true, 
                error: null,
                needsCode: false,
                needsMath: false,
                headings: []
            });
            const contentRef = useRef(null);

            useEffect(() => {
                let ignore = false;
                const filePath = normalizeContentPath(item?.filePath);

                setState(s => ({ ...s, loading: true, error: null }));

                if (!filePath) {
                    setState({ content: '', frontmatter: null, loading: false, error: 'No file path specified.', needsCode: false, needsMath: false });
                    return;
                }

                (async () => {
                    try {
                        const record = await fetchArticleRecord(filePath);
                        if (ignore) return;

                        // ✅ 如果已解析过 HTML，直接用缓存（秒开）
                        if (record.html) {
                          setState({
                            content: record.html,
                            frontmatter: record.meta,
                            loading: false,
                            error: null,
                            needsCode: !!record.needsCode,
                            needsMath: !!record.needsMath,
                            headings: record.headings || []
                          });
                          return;
                        }

                        // ✅ 必需库（文章首次打开才加载）
                        await ensureMarked();
                        await ensureDOMPurify();
                        if (ignore) return;

                        const m = window.marked;
                        const renderer = new m.Renderer();

                        renderer.code = function(entry, langStr) {
                            let codeContent = '';
                            let codeLang = '';

                            if (typeof entry === 'object') {
                                codeContent = entry.text || '';
                                codeLang = entry.lang || 'text';
                            } else {
                                codeContent = entry || '';
                                codeLang = langStr || 'text';
                            }

                            const validLang = (codeLang || 'text').toLowerCase();
                            const buttonData = encodeURIComponent(codeContent);

                            const displayCode = codeContent
                                .replace(/&/g, '&amp;')
                                .replace(/</g, '&lt;')
                                .replace(/>/g, '&gt;')
                                .replace(/"/g, '&quot;')
                                .replace(/'/g, '&#039;');

                            return `
                                <div class="relative group my-8 rounded-lg bg-[#2d2d2d] overflow-hidden shadow-xl border border-stone-700">
                                    <div class="flex justify-between items-center px-4 py-2 bg-[#383838] border-b border-stone-600 select-none">
                                        <span class="text-xs font-mono text-stone-400 uppercase">${validLang}</span>
                                        <button class="copy-btn text-xs font-mono text-stone-400 hover:text-white transition-colors cursor-pointer" data-code="${buttonData}">
                                            Copy
                                        </button>
                                    </div>
                                    <pre class="!m-0 !p-4 overflow-x-auto !bg-[#2d2d2d]"><code class="language-${validLang} !text-gray-200 !font-mono !text-sm">${displayCode}</code></pre>
                                </div>
                            `;
                        };

                        const html = m.parse(record.body, { renderer });

                        const clean = window.DOMPurify
                          ? window.DOMPurify.sanitize(html, { ADD_TAGS: ['button'], ADD_ATTR: ['data-code'] })
                          : html;

                        const annotated = annotateHeadings(clean);

                        // ✅ 写入缓存
                        ARTICLE_CACHE.set(filePath, { ...record, html: annotated.html, headings: annotated.headings });

                        if (ignore) return;
                        setState({
                          content: annotated.html,
                          frontmatter: record.meta,
                          loading: false,
                          error: null,
                          needsCode: !!record.needsCode,
                          needsMath: !!record.needsMath,
                          headings: annotated.headings
                        });
                    } catch (err) {
                        if (!ignore) setState({
                          content: '',
                          frontmatter: null,
                          loading: false,
                          error: err?.message || String(err),
                          needsCode: false,
                          needsMath: false,
                          headings: []
                        });
                    }
                })();

                return () => { ignore = true; };
            }, [item]);

            // ✅ 内容渲染后：lazy 图片、绑定 copy、空闲时加载 Prism/KaTeX 并处理
            useEffect(() => {
              let cancelled = false;
              const root = contentRef.current;
              if (state.loading || state.error || !state.content || !root) return;

              // 1) 图片 lazy-load
              root.querySelectorAll("img").forEach(img => {
                if (!img.getAttribute("loading")) img.setAttribute("loading", "lazy");
                img.decoding = "async";
              });

              // 2) Copy button（防重复绑定）
              const tryCopy = async (text) => {
                // clipboard API
                try {
                  await navigator.clipboard.writeText(text);
                  return true;
                } catch (e) {}

                // fallback
                try {
                  const ta = document.createElement("textarea");
                  ta.value = text;
                  ta.style.position = "fixed";
                  ta.style.opacity = "0";
                  ta.style.left = "-9999px";
                  document.body.appendChild(ta);
                  ta.focus();
                  ta.select();
                  const ok = document.execCommand("copy");
                  document.body.removeChild(ta);
                  return ok;
                } catch (e) {
                  return false;
                }
              };

              root.querySelectorAll(".copy-btn").forEach(btn => {
                if (btn.dataset.bound === "1") return;
                btn.dataset.bound = "1";
                btn.onclick = async () => {
                  try {
                    const code = decodeURIComponent(btn.getAttribute("data-code") || "");
                    const ok = await tryCopy(code);
                    const original = btn.innerText;
                    btn.innerText = ok ? "Copied!" : "Copy failed";
                    btn.classList.toggle("text-emerald-400", ok);
                    btn.classList.toggle("text-red-300", !ok);
                    setTimeout(() => {
                      btn.innerText = original;
                      btn.classList.remove("text-emerald-400", "text-red-300");
                    }, 1800);
                  } catch (e) {
                    console.error("Copy failed", e);
                  }
                };
              });

              // 3) 空闲时做重活：公式渲染、代码高亮
              const runHeavy = async () => {
                if (cancelled) return;
                const rawText = root.textContent || "";
                const shouldRenderMath =
                  state.needsMath ||
                  /\$\$[\s\S]+?\$\$|\$[^$\n]+?\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\)/.test(rawText);

                if (shouldRenderMath) {
                  await ensureKatex();
                  if (cancelled) return;
                  if (window.renderMathInElement) {
                    window.renderMathInElement(root, {
                      delimiters: [
                        { left: "$$", right: "$$", display: true },
                        { left: "$", right: "$", display: false }
                      ],
                      throwOnError: false
                    });
                  }
                }

                if (state.needsCode) {
                  await ensurePrism();
                  if (cancelled) return;
                  if (window.Prism) {
                    window.Prism.highlightAllUnder(root);
                  }
                }
              };

              runWhenIdle(() => { runHeavy().catch(() => {}); }, 1200);

              return () => { cancelled = true; };
            }, [state.content, state.loading, state.error, state.needsCode, state.needsMath]);

            const courseIndex = item?.readingContext?.type === "library-course" ? item.readingContext : null;
            const currentPath = normalizeContentPath(item?.filePath);
            const currentLessonIndex = courseIndex
              ? courseIndex.lessons.findIndex((lesson) => lesson.filePath === currentPath || lesson.id === item?.id)
              : -1;
            const previousLesson = currentLessonIndex > 0 ? courseIndex.lessons[currentLessonIndex - 1] : null;
            const nextLesson = courseIndex && currentLessonIndex >= 0 && currentLessonIndex < courseIndex.lessons.length - 1
              ? courseIndex.lessons[currentLessonIndex + 1]
              : null;
            const hasSidebar = state.headings.length > 0 || (courseIndex && courseIndex.lessons.length > 0);
            const indexCardClass = sectionSurfaceClass;
            const indexLabelClass = "text-[10px] font-mono uppercase tracking-[0.24em] text-stone-400";

            const jumpToHeading = (id) => {
              const node = document.getElementById(id);
              if (!node) return;
              node.scrollIntoView({ behavior: "smooth", block: "start" });
            };

            const openCourseLesson = (lesson) => {
              if (!lesson?.readable || !onSelectItem) return;
              onSelectItem({
                ...lesson,
                title: lesson.title,
                readingContext: courseIndex
              });
            };

            return (
                <div className={`${hasSidebar ? "max-w-[88rem]" : "max-w-[70rem]"} mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-12 min-h-screen`}>
                    <button onClick={onBack} className="group flex items-center text-sm text-stone-400 hover:text-blue-900 mb-10 font-mono uppercase tracking-wider transition-colors">
                        <span className="mr-2 inline-block transition-transform group-hover:-translate-x-1">←</span> Back to List
                    </button>

                    {state.loading && (
                        <div className="flex flex-col items-center py-20 space-y-4">
                            <div className="w-8 h-8 border-2 border-blue-900 border-t-transparent rounded-full animate-spin"></div>
                            <p className="text-stone-400 font-mono text-xs animate-pulse">Loading...</p>
                        </div>
                    )}

                    {state.error && (
                        <div className="p-6 border border-red-200 bg-red-50 rounded-lg text-red-800">
                            <h3 className="font-bold mb-2">Error</h3>
                            <p className="font-mono text-sm">{state.error}</p>
                        </div>
                    )}

                    {!state.loading && !state.error && (
                        <div className={`fade-in ${hasSidebar ? "lg:grid lg:grid-cols-[minmax(0,1fr)_13.5rem] xl:grid-cols-[minmax(0,1fr)_14.5rem] lg:gap-8 xl:gap-10 items-start" : ""}`}>
                            <article className="min-w-0">
                                <header className="mb-12 pb-8 border-b border-stone-200">
                                    <div className="flex flex-wrap gap-3 mb-4 text-xs font-mono uppercase tracking-widest text-stone-500">
                                        {state.frontmatter?.categories && (
                                            <span className="text-blue-900 font-bold">{Array.isArray(state.frontmatter.categories) ? state.frontmatter.categories[0] : state.frontmatter.categories}</span>
                                        )}
                                        {state.frontmatter?.date && <span>• {state.frontmatter.date}</span>}
                                        {courseIndex?.courseTitle && <span>• {courseIndex.courseTitle}</span>}
                                    </div>

                                    <h1 className="text-4xl md:text-5xl font-serif font-bold text-stone-900 mb-6 leading-tight">
                                        {state.frontmatter?.title || item.title}
                                    </h1>

                                    {state.frontmatter?.description && (
                                        <p className="text-xl text-stone-600 font-serif italic font-light leading-relaxed">
                                            {state.frontmatter.description}
                                        </p>
                                    )}

                                    {state.frontmatter?.tags && (
                                        <div className="flex flex-wrap gap-2 mt-6">
                                            {(Array.isArray(state.frontmatter.tags) ? state.frontmatter.tags : [state.frontmatter.tags]).map((tag, i) => (
                                                <span key={i} className="px-2 py-1 bg-stone-100 text-stone-500 text-[10px] font-mono uppercase rounded border border-stone-200">
                                                    #{tag}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </header>

                                {hasSidebar && (
                                    <div className="lg:hidden space-y-6 mb-10">
                                        {state.headings.length > 0 && (
                                            <div className={`${indexCardClass} p-4`}>
                                                <p className={`${indexLabelClass} mb-3`}>Article Index</p>
                                                <div className="space-y-2">
                                                    {state.headings.map((heading) => (
                                                        <button
                                                          key={heading.id}
                                                          type="button"
                                                          onClick={() => jumpToHeading(heading.id)}
                                                          className={`block text-left text-[13px] leading-snug text-stone-600 hover:text-blue-900 transition-colors ${heading.level === 1 ? "font-semibold" : heading.level === 2 ? "pl-2.5" : "pl-5"}`}
                                                        >
                                                            {heading.title}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {courseIndex && (
                                            <div className={`${indexCardClass} p-4`}>
                                                <p className={`${indexLabelClass} mb-2`}>Course Index</p>
                                                <h3 className="font-serif text-lg text-stone-900 mb-3">{courseIndex.courseTitle}</h3>
                                                <div className="space-y-2.5">
                                                    {courseIndex.lessons.map((lesson) => {
                                                      const isCurrent = lesson.filePath === currentPath || lesson.id === item?.id;
                                                      return (
                                                        <button
                                                          key={lesson.id}
                                                          type="button"
                                                          onClick={() => openCourseLesson(lesson)}
                                                          disabled={!lesson.readable || isCurrent}
                                                          className={`w-full text-left rounded-lg border px-3 py-2.5 transition-colors ${isCurrent ? "border-blue-900 bg-blue-50 text-blue-900" : lesson.readable ? "border-stone-200 bg-stone-50 text-stone-700 hover:border-stone-300 hover:bg-white" : "border-stone-100 bg-stone-50/60 text-stone-400 cursor-not-allowed"}`}
                                                        >
                                                            <div className="text-[10px] font-mono uppercase tracking-[0.16em] text-stone-400 mb-1">{lesson.chapterTitle}</div>
                                                            <div className="text-[13px] leading-snug">{lesson.title}</div>
                                                        </button>
                                                      );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div
                                    ref={contentRef}
                                    className="prose prose-stone prose-lg xl:prose-xl prose-headings:font-serif max-w-none prose-img:rounded-lg prose-a:text-blue-900"
                                    dangerouslySetInnerHTML={{ __html: state.content }}
                                ></div>

                                {(previousLesson || nextLesson) && (
                                    <div className="mt-12 pt-8 border-t border-stone-200 grid gap-4 md:grid-cols-2">
                                        <button
                                          type="button"
                                          onClick={() => previousLesson && openCourseLesson(previousLesson)}
                                          disabled={!previousLesson?.readable}
                                          className={`rounded-xl border p-4 text-left transition-colors ${previousLesson?.readable ? "border-stone-200 hover:border-stone-400 hover:bg-stone-50" : "border-stone-100 text-stone-300 cursor-not-allowed"}`}
                                        >
                                            <div className="text-[10px] font-mono uppercase tracking-[0.2em] text-stone-400 mb-2">Previous Note</div>
                                            <div className="font-serif text-lg text-stone-900">{previousLesson?.title || "None"}</div>
                                        </button>
                                        <button
                                          type="button"
                                          onClick={() => nextLesson && openCourseLesson(nextLesson)}
                                          disabled={!nextLesson?.readable}
                                          className={`rounded-xl border p-4 text-left transition-colors ${nextLesson?.readable ? "border-stone-200 hover:border-stone-400 hover:bg-stone-50" : "border-stone-100 text-stone-300 cursor-not-allowed"}`}
                                        >
                                            <div className="text-[10px] font-mono uppercase tracking-[0.2em] text-stone-400 mb-2">Next Note</div>
                                            <div className="font-serif text-lg text-stone-900">{nextLesson?.title || "None"}</div>
                                        </button>
                                    </div>
                                )}
                            </article>

                            {hasSidebar && (
                                <aside className="hidden lg:block">
                                    <div className="sticky top-24 space-y-5">
                                        {state.headings.length > 0 && (
                                            <div className={`${indexCardClass} p-4`}>
                                                <p className={`${indexLabelClass} mb-3`}>Article Index</p>
                                                <div className="space-y-2">
                                                    {state.headings.map((heading) => (
                                                        <button
                                                          key={heading.id}
                                                          type="button"
                                                          onClick={() => jumpToHeading(heading.id)}
                                                          className={`block w-full text-left text-[13px] leading-snug text-stone-600 hover:text-blue-900 transition-colors ${heading.level === 1 ? "font-semibold" : heading.level === 2 ? "pl-2.5" : "pl-5"}`}
                                                        >
                                                            {heading.title}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                        {item.desc}
                    </p>

                    <div className="mt-auto pt-4 border-t border-stone-100 flex items-center text-xs font-mono text-stone-500 uppercase tracking-wider group-hover:text-blue-900 transition-colors">
                        <span className="font-semibold">{item.filePath ? "View Code" : "Open Tool"}</span>
                        <span className="ml-2 group-hover:translate-x-1 transition-transform">→</span>
                    </div>
                </SectionPanel>
            );

            return (
                <SectionShell>
                    <SectionHeader
                      eyebrow="Tools & Templates"
                      title="Workbench"
                      description="Reusable LaTeX templates and small utilities from the workflow."
                      aside={`${latexTemplates.length} templates`}
                    />

                    <div className="mb-20">
                        <div className="flex items-center gap-3 mb-8">
                            <span className="font-mono text-[11px] uppercase tracking-[0.24em] text-blue-900">LaTeX Templates</span>
                            <div className="h-px flex-1 bg-stone-200"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {latexTemplates.length > 0 ? latexTemplates.map(t => (
                                <ToolCard key={t.id} item={t} />
                            )) : <div className="text-stone-400 italic p-4 border border-dashed border-stone-200 w-full">No templates loaded. Check latex_templates.json</div>}
                        </div>
                    </div>

                    <div>
                        <div className="flex items-center gap-3 mb-8">
                            <span className="font-mono text-[11px] uppercase tracking-[0.24em] text-stone-400">General Utilities</span>
                            <div className="h-px flex-1 bg-stone-200"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {generalTools.length > 0 ? generalTools.map(t => (
                                <ToolCard key={t.id} item={t} />
                            )) : <div className="text-stone-400">No general tools loaded.</div>}
                        </div>
                    </div>
                </SectionShell>
            );
        };

        // --- App（✅ 不再用全屏 loading 阻塞首屏；用 DEFAULT_DB 立即可渲染） ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('home');
          const [readingItem, setReadingItem] = useState(null);
          const [db, setDb] = useState(DEFAULT_DB);
          const [loading, setLoading] = useState(true);
          const [fallbackSources, setFallbackSources] = useState([]);

          useEffect(() => {
            const reduceMotion = window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches;
            window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
          }, [activeTab, readingItem]);

          useEffect(() => {
            const safeFetch = async (url) => {
                try {
                    const res = await fetch(url, { cache: "no-cache" });
                    if (!res.ok) throw new Error(res.statusText);
                    return { ok: true, url, data: await res.json() };
                } catch (e) {
                    console.error(`Load failed: ${url}`, e);
                    return { ok: false, url, error: e?.message || String(e) };
                }
            };

            Promise.all([
                safeFetch('public/data/library.json'),
                safeFetch('public/data/papers.json'),
                safeFetch('public/data/lab.json'),
                safeFetch('public/data/post.json'),
                safeFetch('public/data/tools.json'),
                safeFetch('public/data/latex_templates.json')
            ]).then(([library, papers, lab, posts, toolsData, latexData]) => {
                const failedSources = [library, papers, lab, posts, toolsData, latexData]
                  .filter(result => !result.ok)
                  .map(result => result.url.replace('public/data/', '').replace('.json', ''));

                setDb(prev => ({
                    library: library.ok ? library.data : prev.library,
                    papers: papers.ok ? papers.data : prev.papers,
                    lab: lab.ok ? lab.data : prev.lab,
                    posts: posts.ok ? posts.data : prev.posts,
                    tools: {
                        general: toolsData.ok ? toolsData.data : prev.tools.general,
                        latex: latexData.ok ? latexData.data : prev.tools.latex
                    }
                }));
                setFallbackSources(failedSources);
                setLoading(false);
            });
          }, []);

          const renderContent = () => {
            if (readingItem) return <ArticleReader item={readingItem} onBack={() => setReadingItem(null)} onSelectItem={setReadingItem} />;

            switch(activeTab) {
              case 'home': return <Hero setActiveTab={setActiveTab} />;
              case 'library': return <Library data={db.library} onRead={setReadingItem} />;
              case 'papers': return <Papers data={db.papers} onRead={setReadingItem} />;
              case 'lab': return <Lab data={db.lab} />;
              case 'posts': return <Posts data={db.posts} onRead={setReadingItem} />;
              case 'tools': return <Tools data={db.tools} onRead={setReadingItem} />;
              case 'about': return <About />;
              default: return <Hero setActiveTab={setActiveTab} />;
            }
          };

          return (
            <div className="min-h-screen flex flex-col selection:bg-blue-900 selection:text-white">
              <Navbar activeTab={activeTab} setActiveTab={(tab) => { setActiveTab(tab); setReadingItem(null); }} />
              <main className="flex-grow">{renderContent()}</main>
              <footer className="bg-stone-50/90 border-t border-stone-200 py-12 mt-0 text-stone-400 text-xs font-mono">
                <div className="max-w-6xl mx-auto px-6 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>© {new Date().getFullYear()} MIStatlE. Built for the long term.</div>
                    <div className="flex items-center gap-2 uppercase tracking-[0.18em]">
                        <span className={`inline-block h-1.5 w-1.5 rounded-full ${loading ? "bg-blue-600 animate-pulse" : fallbackSources.length > 0 ? "bg-amber-500" : "bg-stone-300"}`}></span>
                        {loading ? (
                            <span>Syncing…</span>
                        ) : fallbackSources.length > 0 ? (
                            <span
                              className="rounded-full border border-stone-200 bg-white px-3 py-1 text-[10px] text-stone-500"
                              title={`Fallback sources: ${fallbackSources.join(', ')}`}
                            >
                                Local Fallback · {fallbackSources.length}
                            </span>
                        ) : (
                            <span>Theory · Practice · Continuity</span>
                        )}
                    </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
